name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck install.sh

  dry-run:
    name: Install Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all referenced files exist
        run: |
          echo "Checking file structure..."
          files=(
            "workflows/loop-job.md"
            "workflows/loop-issue.md"
            "workflows/loop-status.md"
            "workflows/loop-init.md"
            "templates/github/ISSUE_TEMPLATE/bug_report.yml"
            "templates/github/ISSUE_TEMPLATE/feature_request.yml"
            "templates/github/ISSUE_TEMPLATE/config.yml"
            "templates/github/PULL_REQUEST_TEMPLATE.md"
            "templates/github/workflows/auto-label-issues.yml"
            "install.sh"
            "docs/guide.md"
            "README.md"
            "LICENSE"
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              missing=$((missing + 1))
            else
              echo "✅ $f"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::error::$missing file(s) missing!"
            exit 1
          fi
          echo "All files present ✅"

      - name: Verify install.sh is executable
        run: |
          if [ ! -x "install.sh" ]; then
            echo "::error::install.sh is not executable"
            exit 1
          fi
          echo "install.sh executable ✅"

      - name: Test install.sh --help
        run: |
          bash install.sh --help
